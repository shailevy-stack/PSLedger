<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ledger" />
  <meta name="theme-color" content="#2c2416" />
  <title>Shared Ledger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #2c2416; --ink-light: #8a7a5a; --gold: #c9a84c; --gold-light: #fffef5;
      --blue: #8aafc9; --paper: #faf8f3; --card: #fffdf7; --border: #ddd5c0;
      --border-d: #e8dfc8; --green: #2d8a4e; --red: #b94040;
      --st: env(safe-area-inset-top,0px); --sb: env(safe-area-inset-bottom,0px);
    }
    html,body { height:100%; background:var(--paper); font-family:'Georgia','Times New Roman',serif; color:var(--ink); -webkit-tap-highlight-color:transparent; overscroll-behavior:none; }
    #root { max-width:480px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; }

    .header { background:var(--ink); color:#f5f0e8; padding:calc(14px + var(--st)) 18px 14px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header-title { font-size:18px; font-weight:normal; letter-spacing:.04em; }
    .user-badge { background:rgba(255,255,255,.12); border:none; color:#f5f0e8; border-radius:20px; padding:5px 12px; font-size:13px; cursor:pointer; font-family:inherit; }

    .nav { display:flex; background:#3d3020; border-bottom:1px solid var(--ink); position:sticky; top:calc(50px + var(--st)); z-index:9; }
    .nav-btn { flex:1; background:none; border:none; color:#c4b89a; padding:11px 0; font-size:13px; cursor:pointer; font-family:inherit; letter-spacing:.02em; border-bottom:2px solid transparent; }
    .nav-btn.active { color:#f5f0e8; background:var(--ink); border-bottom:2px solid var(--gold); }

    .body { padding:20px 18px calc(20px + var(--sb)); flex:1; }
    .tab-panel { display:none; } .tab-panel.active { display:block; }

    .form { display:flex; flex-direction:column; gap:18px; }
    .form-row { display:flex; flex-direction:column; gap:6px; }
    .label { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-light); }
    .amount-wrap { display:flex; align-items:baseline; gap:6px; border-bottom:2px solid var(--gold); padding:4px 0; }
    .amount-prefix { font-size:32px; font-family:'Georgia',serif; color:var(--ink); line-height:1; }
    .amount-input { font-size:32px; font-family:'Georgia',serif; border:none; background:transparent; color:var(--ink); outline:none; width:100%; padding:0; }
    .text-input { font-size:16px; font-family:'Georgia',serif; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--ink); padding:10px 12px; outline:none; width:100%; }
    .text-input:focus { border-color:var(--gold); }
    select.text-input { appearance:auto; }
    .cat-label-row { display:flex; align-items:center; justify-content:space-between; }
    .auto-hint { font-size:11px; color:var(--gold); font-style:italic; display:none; }
    .select-hi { border-color:var(--gold) !important; background:var(--gold-light) !important; }
    .date-tabs { display:flex; gap:8px; }
    .date-tab { flex:1; padding:9px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--ink-light); font-size:14px; font-family:inherit; cursor:pointer; }
    .date-tab.active { background:var(--ink); color:#f5f0e8; border-color:var(--ink); }
    .date-picker-wrap { display:none; margin-top:8px; }
    .submit-btn { padding:15px; background:var(--ink); color:#f5f0e8; border:none; border-radius:8px; font-size:16px; font-family:inherit; cursor:pointer; letter-spacing:.04em; transition:background .2s; width:100%; }
    .submit-btn:disabled { opacity:.5; cursor:default; }
    .btn-disabled { opacity:.5; pointer-events:none; }
    .submit-btn.saved { background:var(--green); }

    .date-group { font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-light); margin-top:16px; margin-bottom:6px; border-bottom:1px solid var(--border-d); padding-bottom:4px; }
    .expense-row { display:flex; align-items:center; justify-content:space-between; padding:11px 12px; border-radius:8px; margin-bottom:6px; background:var(--card); border:1px solid var(--border-d); }
    .expense-row.mine { border-left:3px solid var(--gold); }
    .expense-row.theirs { border-left:3px solid var(--blue); }
    .expense-left { display:flex; align-items:center; gap:10px; }
    .expense-cat { font-size:22px; }
    .expense-desc { font-size:15px; color:var(--ink); }
    .expense-person { font-size:12px; color:var(--ink-light); margin-top:2px; }
    .expense-right { display:flex; align-items:center; gap:8px; }
    .expense-amt { font-size:17px; color:var(--ink); font-weight:bold; }
    .delete-btn { background:none; border:none; color:#ccc; font-size:20px; cursor:pointer; padding:2px; line-height:1; }
    .sync-row { display:flex; align-items:center; gap:10px; margin-top:16px; }
    .sync-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:7px 14px; color:var(--ink-light); font-size:13px; font-family:inherit; cursor:pointer; }
    .sync-note { font-size:12px; color:#bbb; font-style:italic; }

    .balance-total { background:var(--ink); color:#f5f0e8; border-radius:10px; padding:20px; margin-bottom:16px; text-align:center; }
    .balance-total-label { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:#c4b89a; }
    .balance-total-amt { font-size:38px; margin:6px 0 2px; }
    .balance-fair { font-size:13px; color:#c4b89a; }
    .balance-card { background:var(--card); border:1px solid var(--border-d); border-radius:10px; padding:16px; margin-bottom:10px; }
    .balance-card.me { border-color:var(--gold); background:var(--gold-light); }
    .balance-name { font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-light); }
    .balance-spent { font-size:22px; color:var(--ink); margin:4px 0 6px; }
    .balance-status { font-size:15px; font-style:italic; }
    .verdict { text-align:center; background:#f0ede4; border:1px dashed var(--gold); border-radius:8px; padding:14px; color:var(--ink); font-size:16px; font-style:italic; margin-top:6px; margin-bottom:16px; }

    .range-tabs { display:flex; gap:6px; margin-bottom:16px; }
    .range-tab { flex:1; padding:8px 0; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--ink-light); font-size:13px; font-family:inherit; cursor:pointer; }
    .range-tab.active { background:var(--ink); color:#f5f0e8; border-color:var(--ink); }
    .insights-period { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-light); margin-bottom:14px; }
    .insight-row { margin-bottom:18px; }
    .insight-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .insight-label { display:flex; align-items:center; gap:7px; }
    .insight-emoji { font-size:18px; }
    .insight-name { font-size:15px; color:var(--ink); }
    .insight-amt-block { display:flex; align-items:baseline; gap:6px; }
    .insight-amt { font-size:15px; color:var(--ink); font-weight:bold; }
    .insight-pct { font-size:12px; color:#aaa; }
    .bar-track { height:8px; background:#ede8dc; border-radius:4px; display:flex; overflow:hidden; margin-bottom:5px; }
    .bar-seg { height:100%; }
    .insight-people { display:flex; gap:12px; }
    .insight-chip { font-size:12px; font-style:italic; }
    .legend { display:flex; gap:16px; margin-top:20px; padding-top:14px; border-top:1px solid var(--border-d); }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-light); }
    .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; flex-shrink:0; }

    .screen { min-height:100vh; background:var(--paper); display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:var(--card); border:1px solid var(--border-d); border-radius:16px; padding:36px 28px; width:100%; max-width:340px; box-shadow:0 4px 24px rgba(44,36,22,.08); }
    .card-center { text-align:center; }
    .big-emoji { font-size:48px; margin-bottom:12px; }
    .card-title { font-size:26px; color:var(--ink); margin:0 0 8px; font-weight:normal; }
    .card-sub { font-size:15px; color:var(--ink-light); margin:0 0 28px; }
    .pick-buttons { display:flex; flex-direction:column; gap:12px; }
    .pick-btn { padding:14px; background:var(--ink); color:#f5f0e8; border:none; border-radius:8px; font-size:17px; font-family:inherit; cursor:pointer; }
    .setup-step { display:flex; gap:12px; margin-bottom:16px; }
    .step-num { width:24px; height:24px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; margin-top:2px; }
    .step-title { font-size:13px; font-weight:bold; color:var(--ink); margin-bottom:3px; }
    .step-body { font-size:12px; color:var(--ink-light); line-height:1.6; }
    .step-body a { color:var(--gold); } .step-body code,.step-body kbd { font-size:11px; background:#f0ede4; padding:1px 4px; border-radius:3px; font-family:inherit; }
    .error-msg { font-size:12px; color:var(--red); margin-top:8px; line-height:1.5; }
    .reset-btn { margin-top:20px; background:none; border:1px solid var(--border); color:var(--ink-light); border-radius:6px; padding:6px 14px; cursor:pointer; font-family:inherit; font-size:12px; }
    .empty { text-align:center; color:#aaa; margin-top:40px; font-style:italic; }
    .err-text { text-align:center; color:var(--red); margin-top:40px; font-style:italic; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const PEOPLE = ["Shai","Polina"];
const CATS = ["🛒 Groceries","🍽️ Eating out","🏠 Home","🚌 Transport","💊 Health","👕 Clothing","🎬 Entertainment","✈️ Travel","📦 Other"];
const ls = { get:k=>localStorage.getItem(k)||"", set:(k,v)=>localStorage.setItem(k,v), del:k=>localStorage.removeItem(k) };

// ── API ───────────────────────────────────────────────────────────────────────
async function apiRead(url) {
  const r = await fetch(url+"?action=read");
  if (!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json(); if (j.error) throw new Error(j.error); return j;
}
async function apiWrite(url,data) {
  const r = await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",data})});
  if (!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json(); if (j.error) throw new Error(j.error);
}

// ── Learning ──────────────────────────────────────────────────────────────────
function tok(t){return t.toLowerCase().replace(/[^a-zäöüßа-яёà-ž\s]/g,"").split(/\s+/).filter(w=>w.length>2);}
function inferCat(mem,desc){
  if(!desc.trim()||!mem||!Object.keys(mem).length) return null;
  const words=tok(desc); if(!words.length) return null;
  const sc={}; CATS.forEach(c=>sc[c]=0);
  words.forEach(w=>{if(mem[w])Object.entries(mem[w]).forEach(([c,n])=>{sc[c]=(sc[c]||0)+n;});});
  const best=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];
  return best&&best[1]>0?best[0]:null;
}
function learn(mem,desc,cat){
  const u={...mem};
  tok(desc).forEach(w=>{if(!u[w])u[w]={};u[w][cat]=(u[w][cat]||0)+1;});
  return u;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){
  const d=new Date(iso+"T12:00:00"),t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return "Today";
  if(d.toDateString()===y.toDateString()) return "Yesterday";
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
}
function el(id){return document.getElementById(id);}
function mk(tag,attrs,...kids){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="cls") e.className=v;
    else if(k==="html") e.innerHTML=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  kids.forEach(c=>{if(c==null||c===false)return;e.append(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}

// ── State ─────────────────────────────────────────────────────────────────────
let S={
  url:ls.get("lb_url"), user:ls.get("lb_user"),
  expenses:[], memory:{}, insightsRange:"month",
  loading:true, loadErr:"", setupStep:1, setupUrl:"", setupErr:"", setupBusy:false,
};
let writeLock=false, inferTimer=null, pollTimer=null;

// ── Data ──────────────────────────────────────────────────────────────────────
async function load(quiet=false){
  if(!S.url) return;
  if(!quiet){S.loading=true;S.loadErr="";refreshHistory();}
  try{
    const r=await apiRead(S.url);
    S.expenses=Array.isArray(r.expenses)?r.expenses:[];
    S.memory=(r.memory&&typeof r.memory==="object")?r.memory:{};
    S.loading=false;S.loadErr="";
  }catch(e){S.loading=false;S.loadErr=e.message;}
  refreshHistory(); refreshBalance(); refreshInsights();
}
async function freshWrite(fn){
  if(writeLock)return; writeLock=true;
  try{
    const r=await apiRead(S.url);
    const exps=Array.isArray(r.expenses)?r.expenses:[];
    const mem=(r.memory&&typeof r.memory==="object")?r.memory:{};
    const next=fn(exps,mem);
    await apiWrite(S.url,next);
    S.expenses=next.expenses; S.memory=next.memory;
    refreshHistory(); refreshBalance(); refreshInsights();
  }catch(e){alert("Save failed: "+e.message);}
  writeLock=false;
}
function startPoll(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(()=>load(true),20000);}

// ── Root renderer — decides which top-level screen to show ───────────────────
function renderRoot(){
  const root=el("root"); root.innerHTML="";
  if(!S.url){root.append(buildSetup());return;}
  if(!S.user){root.append(buildPick());return;}
  root.append(buildApp());
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function buildSetup(){
  const steps=[
    {title:"Create the spreadsheet",body:`Go to <a href="https://sheets.new" target="_blank">sheets.new</a>. Name it anything.`},
    {title:"Open Apps Script",body:`In the sheet: <code>Extensions → Apps Script</code>. Editor opens in new tab.`},
    {title:"Paste the server code",body:`Delete existing code, paste the <code>apps-script.js</code> content, save with <code>Ctrl+S</code>.`},
    {title:"Deploy",body:`<code>Deploy → New deployment</code>. Type: Web app. Execute as: <b>Me</b>. Access: <b>Anyone</b>. Deploy, authorise, copy URL.`},
  ];
  const wrap=mk("div",{cls:"screen"},
    mk("div",{cls:"card"},
      mk("div",{cls:"card-center"},
        mk("div",{cls:"big-emoji"},"📒"),
        mk("h1",{cls:"card-title"},"Shared Ledger"),
        mk("p",{style:"font-size:13px;color:#8a7a5a;margin-bottom:20px"},"One-time setup — ~5 minutes"),
      ),
      ...steps.map((s,i)=>{
        const n=i+1,done=S.setupStep>n,active=S.setupStep===n;
        return mk("div",{cls:"setup-step",style:`opacity:${S.setupStep<n?.4:1}`},
          mk("div",{cls:"step-num",style:`background:${done?"#2d8a4e":active?"#2c2416":"#ddd5c0"};color:${active||done?"#f5f0e8":"#8a7a5a"}`},done?"✓":String(n)),
          mk("div",{},mk("div",{cls:"step-title"},s.title),mk("div",{cls:"step-body",html:s.body}))
        );
      }),
      S.setupStep<4
        ? mk("button",{cls:"submit-btn",style:"width:100%;margin-top:8px",onClick:()=>{S.setupStep++;renderRoot();}},"Done, next step →")
        : mk("div",{style:"margin-top:8px"},
            mk("div",{cls:"label",style:"margin-bottom:6px"},"Web app URL"),
            mk("input",{cls:"text-input",type:"text",placeholder:"https://script.google.com/macros/s/...",
              style:"font-size:13px",value:S.setupUrl,
              onInput:e=>S.setupUrl=e.target.value,
            }),
            S.setupErr?mk("div",{cls:"error-msg"},S.setupErr):null,
            mk("button",{cls:"submit-btn",style:`width:100%;margin-top:12px;opacity:${!S.setupUrl||S.setupBusy?.5:1}`,
              onClick:doConnect},"Connect & start"),
          ),
    )
  );
  return wrap;
}
async function doConnect(){
  const url=S.setupUrl.trim(); if(!url)return;
  S.setupBusy=true;S.setupErr="";renderRoot();
  try{
    await apiRead(url); ls.set("lb_url",url); S.url=url; S.setupBusy=false;
    renderRoot(); load(); startPoll();
  }catch(e){S.setupBusy=false;S.setupErr="Could not connect: "+e.message+". Make sure deployed as 'Anyone'.";renderRoot();}
}

// ── Pick ──────────────────────────────────────────────────────────────────────
function buildPick(){
  return mk("div",{cls:"screen"},
    mk("div",{cls:"card card-center"},
      mk("div",{cls:"big-emoji"},"📒"),
      mk("h1",{cls:"card-title"},"Shared Ledger"),
      mk("p",{cls:"card-sub"},"Who are you?"),
      mk("div",{cls:"pick-buttons"},
        ...PEOPLE.map(p=>mk("button",{cls:"pick-btn",onClick:()=>{ls.set("lb_user",p);S.user=p;renderRoot();load();startPoll();}},p))
      ),
      mk("button",{cls:"reset-btn",onClick:()=>{ls.del("lb_url");S.url="";S.setupStep=1;S.setupUrl="";renderRoot();}},"⚙ Reset connection"),
    )
  );
}

// ── App shell (built once per session, never destroyed) ───────────────────────
let appShell=null;
let logForm=null;  // the log form DOM node, kept alive

function buildApp(){
  if(appShell) return appShell;

  // ── Log form (built once, never rebuilt) ──────────────────────────────────
  const amtInput=mk("input",{cls:"amount-input",type:"number",placeholder:"0.00",inputmode:"decimal",
    onInput:e=>{logAmt=e.target.value;updateBtn();}
  });
  const descInput=mk("input",{cls:"text-input",type:"text",placeholder:"e.g. weekly shop, dinner…",
    onInput:e=>{
      logDesc=e.target.value; catManual=false; updateBtn();
    },
    onBlur:e=>{
      if(catManual||e.target.value.trim().length<3) return;
      const c=inferCat(S.memory,e.target.value);
      if(c){logCat=c;catSelect.value=c;catSelect.classList.add("select-hi");autoHint.style.display="";}
    }
  });
  const autoHint=mk("span",{cls:"auto-hint"},"✦ auto-suggested");
  let logAmt="",logDesc="",logCat=CATS[0],catManual=false;

  const catSelect=mk("select",{cls:"text-input",
    onChange:e=>{logCat=e.target.value;catManual=true;catSelect.classList.remove("select-hi");autoHint.style.display="none";}
  },...CATS.map(c=>mk("option",{value:c},c)));

  const todayBtn=mk("button",{cls:"date-tab active",onClick:()=>{logDateMode="today";todayBtn.className="date-tab active";manualBtn.className="date-tab";dateWrap.style.display="none";}}, "Today");
  const manualBtn=mk("button",{cls:"date-tab",onClick:()=>{logDateMode="manual";todayBtn.className="date-tab";manualBtn.className="date-tab active";dateWrap.style.display="";}}, "Pick date");
  const datePick=mk("input",{cls:"text-input",type:"date",value:todayStr(),onChange:e=>logManualDate=e.target.value});
  const dateWrap=mk("div",{cls:"date-picker-wrap"},datePick);
  let logDateMode="today",logManualDate=todayStr();

  const saveBtn=mk("button",{cls:"submit-btn btn-disabled",onClick:async()=>{
    const amt=parseFloat(logAmt);
    if(!amt||amt<=0||!logDesc.trim())return;
    saveBtn.disabled=true;saveBtn.textContent="Saving…";
    const entry={id:Date.now().toString(),person:S.user,amount:amt,description:logDesc.trim(),
      category:logCat,date:logDateMode==="today"?todayStr():logManualDate,createdAt:new Date().toISOString()};
    await freshWrite((exps,mem)=>({
      expenses:[...exps,entry].sort((a,b)=>b.date.localeCompare(a.date)),
      memory:learn(mem,logDesc,logCat),
    }));
    // reset
    logAmt="";logDesc="";logCat=CATS[0];catManual=false;logDateMode="today";
    amtInput.value="";descInput.value="";
    catSelect.value=CATS[0];catSelect.classList.remove("select-hi");autoHint.style.display="none";
    todayBtn.className="date-tab active";manualBtn.className="date-tab";dateWrap.style.display="none";
    saveBtn.className="submit-btn saved";saveBtn.textContent="✓ Saved";
    setTimeout(()=>{saveBtn.className="submit-btn btn-disabled";saveBtn.textContent=`Log as ${S.user}`;updateBtn();},2000);
  }});
  saveBtn.textContent=`Log as ${S.user}`;

  function updateBtn(){
    const ok=parseFloat(logAmt)>0&&logDesc.trim().length>0;
    saveBtn.className="submit-btn"+(ok?"":" btn-disabled");
  }

  logForm=mk("div",{cls:"form"},
    mk("div",{cls:"form-row"},mk("label",{cls:"label"},"Amount"),mk("div",{cls:"amount-wrap"},mk("span",{cls:"amount-prefix"},"€"),amtInput)),
    mk("div",{cls:"form-row"},mk("label",{cls:"label"},"What for?"),descInput),
    mk("div",{cls:"form-row"},mk("div",{cls:"cat-label-row"},mk("label",{cls:"label"},"Category"),autoHint),catSelect),
    mk("div",{cls:"form-row"},mk("label",{cls:"label"},"Date"),mk("div",{cls:"date-tabs"},todayBtn,manualBtn),dateWrap),
    saveBtn,
  );

  // ── History panel ─────────────────────────────────────────────────────────
  const histBody=mk("div",{id:"hist-body"});
  const histPanel=mk("div",{cls:"tab-panel",id:"tab-history"},histBody,
    mk("div",{cls:"sync-row"},
      mk("button",{cls:"sync-btn",onClick:()=>load(true)},"↻ Refresh"),
      mk("span",{cls:"sync-note"},"Auto-refreshes every 20s"),
    )
  );

  // ── Balance panel ─────────────────────────────────────────────────────────
  const balPanel=mk("div",{cls:"tab-panel",id:"tab-balance"});

  // ── Insights panel ────────────────────────────────────────────────────────
  const insPanel=mk("div",{cls:"tab-panel",id:"tab-insights"});

  // ── Shell ─────────────────────────────────────────────────────────────────
  const header=mk("div",{cls:"header"},
    mk("div",{cls:"header-left"},mk("span",{style:"font-size:20px"},"📒"),mk("span",{cls:"header-title"},"Shared Ledger")),
    mk("button",{cls:"user-badge",onClick:()=>{ls.del("lb_user");S.user="";appShell=null;logForm=null;if(pollTimer)clearInterval(pollTimer);renderRoot();}},S.user+" ↩"),
  );

  const tabs=[["log","＋ Log"],["history","History"],["balance","Balance"],["insights","Insights"]];
  let activeTab="log";
  const navBtns={};
  const panels={log:mk("div",{cls:"tab-panel active",id:"tab-log"},logForm),history:histPanel,balance:balPanel,insights:insPanel};

  function switchTab(t){
    navBtns[activeTab].classList.remove("active"); panels[activeTab].classList.remove("active");
    activeTab=t;
    navBtns[t].classList.add("active"); panels[t].classList.add("active");
  }

  const nav=mk("div",{cls:"nav"},...tabs.map(([v,l])=>{
    const b=mk("button",{cls:"nav-btn"+(v==="log"?" active":""),onClick:()=>switchTab(v)},l);
    navBtns[v]=b; return b;
  }));

  const body=mk("div",{cls:"body"},...Object.values(panels));
  appShell=mk("div",{id:"app-shell"},header,nav,body);
  return appShell;
}

// ── Targeted refresh functions (don't touch the log form) ─────────────────────
function refreshHistory(){
  const hb=el("hist-body"); if(!hb)return;
  hb.innerHTML="";
  if(S.loading){hb.append(mk("p",{cls:"empty"},"Loading…"));return;}
  if(S.loadErr){hb.append(mk("p",{cls:"err-text"},S.loadErr));return;}
  if(!S.expenses.length){hb.append(mk("p",{cls:"empty"},"No expenses yet."));return;}
  const grouped={};
  S.expenses.forEach(e=>{if(!grouped[e.date])grouped[e.date]=[];grouped[e.date].push(e);});
  Object.entries(grouped).sort(([a],[b])=>b.localeCompare(a)).forEach(([date,items])=>{
    hb.append(mk("div",{cls:"date-group"},fmtDate(date)));
    items.forEach(e=>{
      hb.append(mk("div",{cls:"expense-row "+(e.person===S.user?"mine":"theirs")},
        mk("div",{cls:"expense-left"},
          mk("span",{cls:"expense-cat"},e.category.split(" ")[0]),
          mk("div",{},mk("div",{cls:"expense-desc"},e.description),mk("div",{cls:"expense-person"},e.person===S.user?"You":e.person)),
        ),
        mk("div",{cls:"expense-right"},
          mk("span",{cls:"expense-amt"},"€"+e.amount.toFixed(2)),
          e.person===S.user?mk("button",{cls:"delete-btn",onClick:()=>freshWrite((ex,m)=>({expenses:ex.filter(x=>x.id!==e.id),memory:m}))},"×"):null,
        ),
      ));
    });
  });
}

function refreshBalance(){
  const bp=el("tab-balance"); if(!bp)return;
  bp.innerHTML="";
  const totals=PEOPLE.reduce((a,p)=>{a[p]=S.expenses.filter(e=>e.person===p).reduce((s,e)=>s+e.amount,0);return a;},{});
  const grand=Object.values(totals).reduce((s,v)=>s+v,0);
  const fair=grand/2;
  const bal=PEOPLE.reduce((a,p)=>{a[p]=totals[p]-fair;return a;},{});
  const partner=PEOPLE.find(p=>p!==S.user);
  bp.append(
    mk("div",{cls:"balance-total"},
      mk("div",{cls:"balance-total-label"},"Total pool spent"),
      mk("div",{cls:"balance-total-amt"},"€"+grand.toFixed(2)),
      mk("div",{cls:"balance-fair"},"Fair share: €"+fair.toFixed(2)+" each"),
    ),
    ...PEOPLE.map(p=>{
      const b=bal[p],isMe=p===S.user;
      return mk("div",{cls:"balance-card"+(isMe?" me":"")},
        mk("div",{cls:"balance-name"},isMe?p+" (you)":p),
        mk("div",{cls:"balance-spent"},"€"+totals[p].toFixed(2)),
        mk("div",{cls:"balance-status",style:`color:${b>0?"#2d8a4e":b<0?"#b94040":"#888"}`},
          Math.abs(b)<.01?"Even ✓":b>0?`+€${b.toFixed(2)} to receive`:`-€${Math.abs(b).toFixed(2)} to contribute`),
      );
    }),
  );
  if(Math.abs(bal[S.user])>.01)
    bp.append(mk("div",{cls:"verdict"},bal[S.user]>0?`${partner} owes you €${bal[S.user].toFixed(2)}`:`You owe ${partner} €${Math.abs(bal[S.user]).toFixed(2)}`));
}

function refreshInsights(){
  const ip=el("tab-insights"); if(!ip)return;
  ip.innerHTML="";
  const now=new Date();
  const rangeTabs=mk("div",{cls:"range-tabs"},...[["month","This month"],["30days","30 days"],["all","All time"]].map(([r,l])=>
    mk("button",{cls:"range-tab"+(S.insightsRange===r?" active":""),onClick:()=>{S.insightsRange=r;refreshInsights();}},l)
  ));
  ip.append(rangeTabs);
  const filtered=S.expenses.filter(e=>{
    const d=new Date(e.date+"T12:00:00");
    if(S.insightsRange==="month")return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    if(S.insightsRange==="30days")return(now-d)/86400000<=30;
    return true;
  });
  const bycat={};
  CATS.forEach(c=>{bycat[c]={total:0,byPerson:{}};PEOPLE.forEach(p=>{bycat[c].byPerson[p]=0;});});
  filtered.forEach(e=>{bycat[e.category].total+=e.amount;bycat[e.category].byPerson[e.person]+=e.amount;});
  const ranked=Object.entries(bycat).filter(([,v])=>v.total>0).sort((a,b)=>b[1].total-a[1].total);
  if(!ranked.length){ip.append(mk("p",{cls:"empty"},"No expenses in this period yet."));return;}
  const grandCat=ranked.reduce((s,[,v])=>s+v.total,0);
  const maxT=ranked[0][1].total;
  const rl=S.insightsRange==="month"?now.toLocaleDateString("en-GB",{month:"long",year:"numeric"}):S.insightsRange==="30days"?"Last 30 days":"All time";
  ip.append(mk("div",{cls:"insights-period"},rl+" · €"+grandCat.toFixed(2)+" total"));
  ranked.forEach(([cat,data])=>{
    const emoji=cat.split(" ")[0],name=cat.split(" ").slice(1).join(" ");
    const pct=((data.total/grandCat)*100).toFixed(0);
    const bars=PEOPLE.map((p,i)=>{const w=data.byPerson[p]>0?(data.byPerson[p]/maxT)*100:0;return w>0?mk("div",{cls:"bar-seg",style:`width:${w}%;background:${i===0?"#c9a84c":"#8aafc9"};border-radius:${i===0?"3px 0 0 3px":"0 3px 3px 0"}`}):null;}).filter(Boolean);
    const chips=PEOPLE.map((p,i)=>data.byPerson[p]>0?mk("span",{cls:"insight-chip",style:`color:${i===0?"#a07830":"#4a7a9b"}`},`${p===S.user?"You":p} €${data.byPerson[p].toFixed(2)}`):null).filter(Boolean);
    ip.append(mk("div",{cls:"insight-row"},
      mk("div",{cls:"insight-top"},mk("div",{cls:"insight-label"},mk("span",{cls:"insight-emoji"},emoji),mk("span",{cls:"insight-name"},name)),mk("div",{cls:"insight-amt-block"},mk("span",{cls:"insight-amt"},"€"+data.total.toFixed(2)),mk("span",{cls:"insight-pct"},pct+"%"))),
      mk("div",{cls:"bar-track"},...bars),
      mk("div",{cls:"insight-people"},...chips),
    ));
  });
  ip.append(mk("div",{cls:"legend"},...PEOPLE.map((p,i)=>mk("span",{cls:"legend-item"},mk("span",{cls:"legend-dot",style:`background:${i===0?"#c9a84c":"#8aafc9"}`}),p===S.user?p+" (you)":p))));
}

// ── Boot ──────────────────────────────────────────────────────────────────────
renderRoot();
if(S.url&&S.user){load();startPoll();}
</script>
</body>
</html>
