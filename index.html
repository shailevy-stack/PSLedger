<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PS Central" />
  <meta name="theme-color" content="#2c2416" />
  <title>PS Central</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #2c2416; --ink-light: #8a7a5a; --gold: #c9a84c; --gold-light: #fffef5;
      --blue: #8aafc9; --paper: #faf8f3; --card: #fffdf7; --border: #ddd5c0;
      --border-d: #e8dfc8; --green: #2d8a4e; --red: #b94040;
      --st: env(safe-area-inset-top,0px); --sb: env(safe-area-inset-bottom,0px);
    }
    html,body { height:100%; background:var(--paper); font-family:'Georgia','Times New Roman',serif; color:var(--ink); -webkit-tap-highlight-color:transparent; overscroll-behavior:none; }
    #root { max-width:480px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; }

    .header { background:var(--ink); color:#f5f0e8; padding:calc(14px + var(--st)) 18px 14px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
    .header-left { display:flex; align-items:center; gap:10px; }
    .header-title { font-size:18px; font-weight:normal; letter-spacing:.04em; }
    .user-badge { background:rgba(255,255,255,.12); border:none; color:#f5f0e8; border-radius:20px; padding:5px 12px; font-size:13px; cursor:pointer; font-family:inherit; }

    .section-bar { display:flex; background:var(--ink); border-bottom:2px solid #1a1208; position:sticky; top:calc(50px + var(--st)); z-index:10; }
    .section-btn { flex:1; background:none; border:none; color:#8a6a3a; padding:10px 0; font-size:12px; cursor:pointer; font-family:inherit; letter-spacing:.04em; border-bottom:2px solid transparent; display:flex; flex-direction:column; align-items:center; gap:2px; }
    .section-btn .s-icon { font-size:16px; }
    .section-btn .s-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; }
    .section-btn.active { color:#f5f0e8; border-bottom:2px solid var(--gold); }

    .nav { display:flex; background:#3d3020; border-bottom:1px solid var(--ink); position:sticky; top:calc(90px + var(--st)); z-index:9; }
    .nav-btn { flex:1; background:none; border:none; color:#c4b89a; padding:11px 0; font-size:13px; cursor:pointer; font-family:inherit; letter-spacing:.02em; border-bottom:2px solid transparent; }
    .nav-btn.active { color:#f5f0e8; background:var(--ink); border-bottom:2px solid var(--gold); }

    .sec-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-left:5px; flex-shrink:0; vertical-align:middle; background:var(--ink-light); }
    .sec-dot.local { background:#8a6a3a; animation:none; }
    .sec-dot.saving { background:var(--gold); animation:blink .5s infinite alternate; }
    .sec-dot.synced { background:var(--green); animation:none; }
    .sec-dot.new { background:var(--red); animation:none; }
    .sec-dot.pulling { background:var(--red); animation:blink .5s infinite alternate; }
    @keyframes blink { from{opacity:1} to{opacity:.15} }
    .shop-input-row { display:flex; gap:8px; margin-bottom:16px; }
    .shop-input { flex:1; font-size:16px; font-family:'Georgia',serif; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--ink); padding:12px 14px; outline:none; }
    .shop-input:focus { border-color:var(--gold); }
    .shop-add-btn { padding:12px 18px; background:var(--ink); color:#f5f0e8; border:none; border-radius:8px; font-size:20px; cursor:pointer; }
    .shop-done-btn { padding:12px 14px; background:var(--green); color:#f5f0e8; border:none; border-radius:8px; font-size:18px; cursor:pointer; flex-shrink:0; }
    .shop-item { display:flex; align-items:center; gap:10px; padding:13px 12px; border-radius:8px; margin-bottom:6px; background:var(--card); border:1px solid var(--border-d); transition:opacity .3s, filter .3s; user-select:none; }
    .shop-item.done { opacity:.45; filter:grayscale(.8); }
    .shop-check { width:22px; height:22px; border-radius:50%; border:2px solid var(--border); background:transparent; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; }
    .shop-item.done .shop-check { background:var(--ink); border-color:var(--ink); color:#f5f0e8; }
    .shop-text { flex:1; font-size:16px; color:var(--ink); }
    .shop-item.done .shop-text { text-decoration:line-through; color:var(--ink-light); }
    .shop-handle { color:#ccc; font-size:18px; cursor:grab; padding:2px 8px 2px 0; touch-action:none; flex-shrink:0; user-select:none; }
    .shop-item.dragging { opacity:.35; background:#f0ede4; }
    .shop-item.drag-over { border-top:2px solid var(--gold); margin-top:-2px; }
    .shop-item.c-gold { background:#fff8e6; border-color:#e8c96a; }
    .shop-item.c-blue { background:#eef4f9; border-color:#8aafc9; }
    .shop-item.c-green { background:#eef5f0; border-color:#8fbb9a; }
    #section-shopping, #section-blackboard { display:none; flex:1; }
    #section-shopping.active, #section-blackboard.active { display:block; }

    .body { padding:20px 18px calc(20px + var(--sb)); flex:1; }
    .tab-panel { display:none; } .tab-panel.active { display:block; }

    .form { display:flex; flex-direction:column; gap:18px; }
    .form-row { display:flex; flex-direction:column; gap:6px; overflow:hidden; }
    .label { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-light); }
    .amount-wrap { display:flex; align-items:baseline; gap:6px; border-bottom:2px solid var(--gold); padding:4px 0; }
    .amount-prefix { font-size:32px; font-family:'Georgia',serif; color:var(--ink); line-height:1; }
    .amount-input { font-size:32px; font-family:'Georgia',serif; border:none; background:transparent; color:var(--ink); outline:none; width:100%; padding:0; }

    .text-input:focus { border-color:var(--gold); }
    select.text-input { appearance:auto; }
    .cat-label-row { display:flex; align-items:center; justify-content:space-between; }
    .auto-hint { font-size:11px; color:var(--gold); font-style:italic; display:none; }
    .select-hi { border-color:var(--gold) !important; background:var(--gold-light) !important; }
    .date-tabs { display:flex; gap:8px; }
    .date-tab { flex:1; padding:9px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--ink-light); font-size:14px; font-family:inherit; cursor:pointer; }
    .date-tab.active { background:var(--ink); color:#f5f0e8; border-color:var(--ink); }
    .submit-btn { padding:15px; background:var(--ink); color:#f5f0e8; border:none; border-radius:8px; font-size:16px; font-family:inherit; cursor:pointer; letter-spacing:.04em; transition:background .2s; width:100%; }
    .submit-btn:disabled { opacity:.5; cursor:default; }

    .submit-btn.saved { background:var(--green); }

    .date-group { font-size:11px; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-light); margin-top:16px; margin-bottom:6px; border-bottom:1px solid var(--border-d); padding-bottom:4px; }
    .expense-row { display:flex; align-items:center; justify-content:space-between; padding:11px 12px; border-radius:8px; margin-bottom:6px; background:var(--card); border:1px solid var(--border-d); }
    .expense-row.editing { background:#f5f5f2; border-color:#bbb; }
    .edit-form { display:flex; flex-direction:column; gap:8px; padding:4px 0; width:100%; max-width:100%; box-sizing:border-box; }
    .edit-row-inputs { display:flex; gap:6px; }
    .edit-amt { font-size:16px; font-family:'Georgia',serif; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--ink); padding:7px 10px; width:80px; outline:none; }
    .edit-desc { font-size:16px; font-family:'Georgia',serif; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--ink); padding:7px 10px; flex:1; outline:none; }
    .edit-cat { font-size:16px; font-family:'Georgia',serif; border:1px solid var(--border); border-radius:6px; background:var(--card); color:var(--ink); padding:7px 10px; width:100%; outline:none; }
    .edit-date-row { display:flex; gap:6px; align-items:center; }
    .edit-date-tab { flex:1; padding:6px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--ink-light); font-size:16px; font-family:inherit; cursor:pointer; text-align:center; }
    .edit-date-tab.active { background:var(--ink); color:#f5f0e8; border-color:var(--ink); }
    .edit-date-display { font-size:16px; color:var(--ink-light); padding:4px 0; }
    .edit-actions { display:flex; gap:6px; }
    .edit-save { flex:1; padding:8px; background:var(--ink); color:#f5f0e8; border:none; border-radius:6px; font-size:13px; font-family:inherit; cursor:pointer; }
    .edit-cancel { padding:8px 14px; background:none; border:1px solid var(--border); color:var(--ink-light); border-radius:6px; font-size:13px; font-family:inherit; cursor:pointer; }
    .expense-row.saving { opacity:0.5; filter:grayscale(1); transition:opacity 0.2s, filter 0.2s; }
    .expense-row.save-done { opacity:1; filter:grayscale(0); transition:opacity 0.4s, filter 0.4s; }
    .expense-row.theirs { border-left:3px solid var(--blue); }
    .expense-left { display:flex; align-items:center; gap:10px; }
    .expense-cat { font-size:22px; }
    .expense-desc { font-size:15px; color:var(--ink); }
    .expense-person { font-size:12px; color:var(--ink-light); margin-top:2px; }
    .expense-right { display:flex; align-items:center; gap:8px; }
    .expense-amt { font-size:17px; color:var(--ink); font-weight:bold; }
    .delete-btn { background:none; border:none; color:#ccc; font-size:20px; cursor:pointer; padding:2px; line-height:1; }
    .sync-row { display:flex; align-items:center; gap:10px; margin-top:16px; }
    .sync-btn { background:none; border:1px solid var(--border); border-radius:6px; padding:7px 14px; color:var(--ink-light); font-size:13px; font-family:inherit; cursor:pointer; }
    .sync-note { font-size:12px; color:#bbb; font-style:italic; }

    .balance-total { background:var(--ink); color:#f5f0e8; border-radius:10px; padding:20px; margin-bottom:16px; text-align:center; }
    .balance-total-label { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:#c4b89a; }
    .balance-total-amt { font-size:38px; margin:6px 0 2px; }
    .balance-fair { font-size:13px; color:#c4b89a; }
    .balance-card { background:var(--card); border:1px solid var(--border-d); border-radius:10px; padding:16px; margin-bottom:10px; }
    .balance-card.me { border-color:var(--gold); background:var(--gold-light); }
    .balance-name { font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-light); }
    .balance-spent { font-size:22px; color:var(--ink); margin:4px 0 6px; }
    .balance-status { font-size:15px; font-style:italic; }
    .verdict { text-align:center; background:#f0ede4; border:1px dashed var(--gold); border-radius:8px; padding:14px; color:var(--ink); font-size:16px; font-style:italic; margin-top:6px; margin-bottom:16px; }

    .range-tabs { display:flex; gap:6px; margin-bottom:16px; }
    .range-tab { flex:1; padding:8px 0; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--ink-light); font-size:13px; font-family:inherit; cursor:pointer; }
    .range-tab.active { background:var(--ink); color:#f5f0e8; border-color:var(--ink); }
    .insights-period { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-light); margin-bottom:14px; }
    .insight-row { margin-bottom:18px; }
    .insight-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
    .insight-label { display:flex; align-items:center; gap:7px; }
    .insight-emoji { font-size:18px; }
    .insight-name { font-size:15px; color:var(--ink); }
    .insight-amt-block { display:flex; align-items:baseline; gap:6px; }
    .insight-amt { font-size:15px; color:var(--ink); font-weight:bold; }
    .insight-pct { font-size:12px; color:#aaa; }
    .bar-track { height:8px; background:#ede8dc; border-radius:4px; display:flex; overflow:hidden; margin-bottom:5px; }
    .bar-seg { height:100%; }
    .insight-people { display:flex; gap:12px; }
    .insight-chip { font-size:12px; font-style:italic; }
    .legend { display:flex; gap:16px; margin-top:20px; padding-top:14px; border-top:1px solid var(--border-d); }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-light); }
    .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; flex-shrink:0; }

    .screen { min-height:100vh; background:var(--ink); display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { background:var(--card); border:1px solid var(--border-d); border-radius:16px; padding:44px 32px 32px; width:100%; max-width:340px; box-shadow:0 4px 24px rgba(44,36,22,.08); }
    .card-center { text-align:center; }
    .big-emoji { font-size:48px; margin-bottom:16px; }
    .card-title { font-size:28px; color:var(--ink); margin:0 0 0; font-weight:normal; letter-spacing:0.02em; }
    .card-sub { font-size:15px; color:var(--ink-light); margin:0 0 28px; }
    .pick-buttons { display:flex; flex-direction:column; gap:12px; }
    .pick-btn { padding:14px; background:var(--ink); color:#f5f0e8; border:none; border-radius:8px; font-size:17px; font-family:inherit; cursor:pointer; }
    .setup-step { display:flex; gap:12px; margin-bottom:16px; }
    .step-num { width:24px; height:24px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; margin-top:2px; }
    .step-title { font-size:13px; font-weight:bold; color:var(--ink); margin-bottom:3px; }
    .step-body { font-size:12px; color:var(--ink-light); line-height:1.6; }
    .step-body a { color:var(--gold); } .step-body code,.step-body kbd { font-size:11px; background:#f0ede4; padding:1px 4px; border-radius:3px; font-family:inherit; }
    .error-msg { font-size:12px; color:var(--red); margin-top:8px; line-height:1.5; }
    .reset-btn { margin-top:20px; background:none; border:1px solid var(--border); color:var(--ink-light); border-radius:6px; padding:6px 14px; cursor:pointer; font-family:inherit; font-size:12px; }
    .empty { text-align:center; color:#aaa; margin-top:40px; font-style:italic; }
    .err-text { text-align:center; color:var(--red); margin-top:40px; font-style:italic; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const PEOPLE = ["Shai","Polina"];
const CATS = ["🛒 Groceries","🍽️ Eating out","🏠 Home","🚌 Transport","💊 Health","👕 Clothing","🎬 Entertainment","✈️ Travel","📦 Other"];
const ls = { get:k=>localStorage.getItem(k)||"", set:(k,v)=>localStorage.setItem(k,v), del:k=>localStorage.removeItem(k) };

// ── API ───────────────────────────────────────────────────────────────────────
async function apiRead(url) {
  const r = await fetch(url+"?action=read");
  if (!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json(); if (j.error) throw new Error(j.error); return j;
}
async function apiWrite(url,data) {
  const r = await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"write",data})});
  if (!r.ok) throw new Error("HTTP "+r.status);
  const j = await r.json(); if (j.error) throw new Error(j.error);
}

// ── Learning ──────────────────────────────────────────────────────────────────
function tok(t){return t.toLowerCase().replace(/[^a-zäöüßа-яёà-ž\s]/g,"").split(/\s+/).filter(w=>w.length>2);}
function inferCat(mem,desc){
  if(!desc.trim()||!mem||!Object.keys(mem).length) return null;
  const words=tok(desc); if(!words.length) return null;
  const sc={}; CATS.forEach(c=>sc[c]=0);
  words.forEach(w=>{if(mem[w])Object.entries(mem[w]).forEach(([c,n])=>{sc[c]=(sc[c]||0)+n;});});
  const best=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];
  return best&&best[1]>0?best[0]:null;
}
function learn(mem,desc,cat){
  const u={...mem};
  tok(desc).forEach(w=>{if(!u[w])u[w]={};u[w][cat]=(u[w][cat]||0)+1;});
  return u;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){
  const d=new Date(iso+"T12:00:00"),t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);
  if(d.toDateString()===t.toDateString()) return "Today";
  if(d.toDateString()===y.toDateString()) return "Yesterday";
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
}
function el(id){return document.getElementById(id);}
function mk(tag,attrs,...kids){
  const e=document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if(k==="cls") e.className=v;
    else if(k==="html") e.innerHTML=v;
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  kids.forEach(c=>{if(c==null||c===false)return;e.append(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}

// ── State ─────────────────────────────────────────────────────────────────────
let S={
  url:ls.get("lb_url"), user:ls.get("lb_user"),
  section:ls.get("lb_section")||"ledger",
  expenses:[], memory:{}, shopping:[], insightsRange:"month",
  loading:true, loadErr:"", setupStep:1, setupUrl:"", setupErr:"", setupBusy:false,
};
let writeLock=false, inferTimer=null, pollTimer=null;
let updateLogBtn = null; // set by buildApp, called after any write

// ── Data ──────────────────────────────────────────────────────────────────────
async function load(quiet=false){
  if(!S.url) return;
  if(!quiet){S.loading=true;S.loadErr="";refreshHistory();}
  try{
    const r=await apiRead(S.url);
    S.expenses=Array.isArray(r.expenses)?r.expenses:[];
    S.memory=(r.memory&&typeof r.memory==="object")?r.memory:{};
    if(!_shopDirty) S.shopping=Array.isArray(r.shopping)?r.shopping:[];
    S.loading=false;S.loadErr="";
  }catch(e){S.loading=false;S.loadErr=e.message;}
  refreshHistory(); refreshBalance(); refreshInsights();
  // check if ledger has new data since last seen
  if(S.expenses.length > _lastSeenExpenseCount){
    if(_lastSeenExpenseCount>0){
      setDot("dot-ledger","new");
      setDot("dot-history","new");
    } else {
      // first load — set baseline, no red dot
      _lastSeenExpenseCount=S.expenses.length;
      setDot("dot-ledger","synced");
      setDot("dot-history","synced");
    }
    // don't update _lastSeenExpenseCount yet — user hasn't seen it
  } else {
    setDot("dot-ledger","synced");
    setDot("dot-history","synced");
  }
  // shopping
  if(!_shopDirty){
    const newHash=S.shopping.map(i=>i.id+i.done+i.color).join("|");
    const midnight_clear=()=>{
      const today=todayStr();
      const lastClear=ls.get("shop_clear_date");
      if(lastClear && lastClear!==today){
        const cleared=S.shopping.filter(i=>!i.done);
        if(cleared.length!==S.shopping.length){S.shopping=cleared;apiWrite(S.url,{expenses:S.expenses,memory:S.memory,shopping:cleared});}
        ls.set("shop_clear_date",today);
      } else if(!lastClear) ls.set("shop_clear_date",today);
    };
    midnight_clear();
    if(_lastSeenShoppingHash===null){ 
      // first load — set baseline
      _lastSeenShoppingHash=newHash;
      refreshShopping();
      setDot("dot-shopping","synced");
    } else if(newHash!==_lastSeenShoppingHash){
      // server has new shopping data
      setDot("dot-shopping","new");
      // don't update hash yet — user hasn't seen it
    } else {
      setDot("dot-shopping","synced");
    }
  }
  if(updateLogBtn) updateLogBtn();
}
async function freshWrite(fn){
  if(writeLock)return; writeLock=true;
  try{
    const next=fn(S.expenses, S.memory, S.shopping);
    S.expenses=next.expenses; S.memory=next.memory; S.shopping=next.shopping||S.shopping;
    _lastSeenExpenseCount=S.expenses.length;
    refreshHistory(); refreshBalance(); refreshInsights(); rebuildShopList();
    if(updateLogBtn) updateLogBtn();
    setDot("dot-ledger","saving");
    await apiWrite(S.url,next);
    setDot("dot-ledger","synced");
  }catch(e){alert("Save failed: "+e.message); setDot("dot-ledger","local");}
  writeLock=false;
}
// ── Unified dot system ────────────────────────────────────────────────────────
function setDot(id, state){ const d=el(id); if(d) d.className="sec-dot "+state; }

// ── Shopping state ────────────────────────────────────────────────────────────
let _shopDirty=false;
let _shopAutoTimer=null;
async function shopWrite(newShopping){
  S.shopping=newShopping;
  _shopDirty=true;
  rebuildShopList();
  setDot("dot-shopping","local");
  if(_shopAutoTimer) clearTimeout(_shopAutoTimer);
  _shopAutoTimer=setTimeout(()=>shopCommit(),10000);
}
async function shopCommit(){
  if(_shopAutoTimer){clearTimeout(_shopAutoTimer);_shopAutoTimer=null;}
  if(!_shopDirty) return;
  setDot("dot-shopping","saving");
  try{
    await apiWrite(S.url,{expenses:S.expenses,memory:S.memory,shopping:S.shopping});
    _shopDirty=false;
    _lastSeenShoppingHash=S.shopping.map(i=>i.id+i.done+i.color).join("|");
    setDot("dot-shopping","synced");
  }catch(e){
    setDot("dot-shopping","local");
    alert("Save failed: "+e.message);
  }
}

// ── Ledger state ──────────────────────────────────────────────────────────────
let _lastSeenExpenseCount=0;
let _lastSeenShoppingHash=null;
function startPoll(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(()=>load(true),20000);}

// ── Root renderer — decides which top-level screen to show ───────────────────
function renderRoot(){
  const root=el("root"); root.innerHTML="";
  if(!S.url){root.append(buildSetup());return;}
  if(!S.user){root.append(buildPick());return;}
  root.append(buildApp());
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function buildSetup(){
  const steps=[
    {title:"Create the spreadsheet",body:`Go to <a href="https://sheets.new" target="_blank">sheets.new</a>. Name it anything.`},
    {title:"Open Apps Script",body:`In the sheet: <code>Extensions → Apps Script</code>. Editor opens in new tab.`},
    {title:"Paste the server code",body:`Delete existing code, paste the <code>apps-script.js</code> content, save with <code>Ctrl+S</code>.`},
    {title:"Deploy",body:`<code>Deploy → New deployment</code>. Type: Web app. Execute as: <b>Me</b>. Access: <b>Anyone</b>. Deploy, authorise, copy URL.`},
  ];
  const wrap=mk("div",{cls:"screen"},
    mk("div",{cls:"card"},
      mk("div",{cls:"card-center"},
        mk("div",{cls:"big-emoji"},"❤️"),
        mk("h1",{cls:"card-title"},"PS Central"),
        mk("p",{style:"font-size:13px;color:#8a7a5a;margin-bottom:20px"},"One-time setup — ~5 minutes"),
      ),
      ...steps.map((s,i)=>{
        const n=i+1,done=S.setupStep>n,active=S.setupStep===n;
        return mk("div",{cls:"setup-step",style:`opacity:${S.setupStep<n?.4:1}`},
          mk("div",{cls:"step-num",style:`background:${done?"#2d8a4e":active?"#2c2416":"#ddd5c0"};color:${active||done?"#f5f0e8":"#8a7a5a"}`},done?"✓":String(n)),
          mk("div",{},mk("div",{cls:"step-title"},s.title),mk("div",{cls:"step-body",html:s.body}))
        );
      }),
      S.setupStep<4
        ? mk("button",{cls:"submit-btn",style:"width:100%;margin-top:8px",onClick:()=>{S.setupStep++;renderRoot();}},"Done, next step →")
        : mk("div",{style:"margin-top:8px"},
            mk("div",{cls:"label",style:"margin-bottom:6px"},"Web app URL"),
            mk("input",{cls:"text-input",type:"text",placeholder:"https://script.google.com/macros/s/...",
              style:"font-size:13px",value:S.setupUrl,
              onInput:e=>S.setupUrl=e.target.value,
            }),
            S.setupErr?mk("div",{cls:"error-msg"},S.setupErr):null,
            mk("button",{cls:"submit-btn",style:`width:100%;margin-top:12px;opacity:${!S.setupUrl||S.setupBusy?.5:1}`,
              onClick:doConnect},"Connect & start"),
          ),
    )
  );
  return wrap;
}
async function doConnect(){
  const url=S.setupUrl.trim(); if(!url)return;
  S.setupBusy=true;S.setupErr="";renderRoot();
  try{
    await apiRead(url); ls.set("lb_url",url); S.url=url; S.setupBusy=false;
    renderRoot(); load(); startPoll();
  }catch(e){S.setupBusy=false;S.setupErr="Could not connect: "+e.message+". Make sure deployed as 'Anyone'.";renderRoot();}
}

// ── App shell (built once per session, never destroyed) ───────────────────────
let appShell=null;
let logForm=null;  // the log form DOM node, kept alive

function buildApp(){
  if(appShell) return appShell;

  // ── Log form (built once, never rebuilt) ──────────────────────────────────
  const amtInput=mk("input",{cls:"amount-input",type:"number",placeholder:"0.00",inputmode:"decimal",
    onInput:e=>{logAmt=e.target.value;updateBtn();}
  });
  const descInput=mk("input",{cls:"text-input",type:"text",placeholder:"e.g. weekly shop, dinner…",
    onInput:e=>{
      logDesc=e.target.value; catManual=false; updateBtn();
    },
    onBlur:e=>{
      if(catManual||e.target.value.trim().length<3) return;
      const c=inferCat(S.memory,e.target.value);
      if(c){logCat=c;catSelect.value=c;catSelect.classList.add("select-hi");autoHint.style.display="";}
    }
  });
  const autoHint=mk("span",{cls:"auto-hint"},"✦ auto-suggested");
  let logAmt="",logDesc="",logCat=CATS[0],catManual=false;

  const catSelect=mk("select",{cls:"text-input",
    onChange:e=>{logCat=e.target.value;catManual=true;catSelect.classList.remove("select-hi");autoHint.style.display="none";}
  },...CATS.map(c=>mk("option",{value:c},c)));

  const todayBtn=mk("button",{cls:"date-tab active",
    type:"button",
    onClick:()=>{
      logDateMode="today";
      todayBtn.className="date-tab active";
      manualBtn.className="date-tab";
      logManualDate=todayStr();
      dateDisplay.textContent="Today";
      updateBtn();
    }
  }, "Today");

  const datePick=mk("input",{type:"date",value:todayStr(),
    style:"position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:1;",
    onChange:e=>{
      if(!e.target.value) return;
      logManualDate=e.target.value;
      logDateMode="manual";
      todayBtn.className="date-tab";
      manualBtn.className="date-tab active";
      dateDisplay.textContent=fmtDate(e.target.value);
      updateBtn();
    }
  });
  const manualBtn=mk("div",{cls:"date-tab",style:"position:relative;cursor:pointer;text-align:center;user-select:none;"},"Pick date");
  manualBtn.appendChild(datePick);

  const dateDisplay=mk("div",{style:"margin-top:8px;font-size:15px;color:#8a7a5a;padding:4px 0;"},"Today");
  let logDateMode="today",logManualDate=todayStr();

  const saveBtn=mk("button",{cls:"submit-btn btn-disabled",onClick:async()=>{
    const amt=parseFloat(logAmt);
    if(!amt||amt<=0||!logDesc.trim())return;
    saveBtn.disabled=true;saveBtn.textContent="Saving…";
    const entry={id:Date.now().toString(),person:S.user,amount:amt,description:logDesc.trim(),
      category:logCat,date:logDateMode==="today"?todayStr():logManualDate,createdAt:new Date().toISOString()};
    await freshWrite((exps,mem,shop)=>({
      expenses:[...exps,entry].sort((a,b)=>b.date.localeCompare(a.date)),
      memory:learn(mem,logDesc,logCat),
      shopping:shop,
    }));
    // reset
    logAmt="";logDesc="";logCat=CATS[0];catManual=false;logDateMode="today";
    amtInput.value="";descInput.value="";
    catSelect.value=CATS[0];catSelect.classList.remove("select-hi");autoHint.style.display="none";
    todayBtn.className="date-tab active"; manualBtn.className="date-tab";
    dateDisplay.textContent="Today"; logDateMode="today";
    saveBtn.className="submit-btn saved";saveBtn.textContent="✓ Saved";
    setTimeout(()=>{saveBtn.className="submit-btn btn-disabled";saveBtn.textContent=`Log as ${S.user}`;updateBtn();},2000);
  }});
  saveBtn.textContent=`Log as ${S.user}`;

  function updateBtn(){
    const ok=parseFloat(logAmt)>0&&logDesc.trim().length>0;
    saveBtn.disabled=false;
    saveBtn.className="submit-btn"+(ok?"":" btn-disabled");
  }
  updateLogBtn = updateBtn;

  logForm=mk("div",{cls:"form"},
    mk("div",{cls:"form-row"},mk("label",{cls:"label"},"Amount"),mk("div",{cls:"amount-wrap"},mk("span",{cls:"amount-prefix"},"€"),amtInput)),
    mk("div",{cls:"form-row"},mk("label",{cls:"label"},"What for?"),descInput),
    mk("div",{cls:"form-row"},mk("div",{cls:"cat-label-row"},mk("label",{cls:"label"},"Category"),autoHint),catSelect),
    mk("div",{cls:"form-row",style:"position:relative;"},mk("label",{cls:"label"},"Date"),mk("div",{cls:"date-tabs"},todayBtn,manualBtn),dateDisplay),
    saveBtn,
  );

  // ── History panel ─────────────────────────────────────────────────────────
  const histBody=mk("div",{id:"hist-body"});
  const histPanel=mk("div",{cls:"tab-panel",id:"tab-history"},histBody,
    mk("div",{cls:"sync-row"},
      mk("button",{cls:"sync-btn",onClick:()=>load(true)},"↻ Refresh"),
      mk("span",{cls:"sync-note"},"Auto-refreshes every 20s"),
    )
  );

  // ── Balance panel ─────────────────────────────────────────────────────────
  const balPanel=mk("div",{cls:"tab-panel",id:"tab-balance"});

  // ── Insights panel ────────────────────────────────────────────────────────
  const insPanel=mk("div",{cls:"tab-panel",id:"tab-insights"});

  // ── Shell ─────────────────────────────────────────────────────────────────
  const header=mk("div",{cls:"header"},
    mk("div",{cls:"header-left"},mk("span",{style:"font-size:18px"},"❤️"),mk("span",{cls:"header-title"},"PS Central")),
    mk("button",{cls:"user-badge",onClick:()=>{ls.del("lb_user");S.user="";appShell=null;logForm=null;_shopInpEl=null;_shopDirty=false;_lastSeenShoppingHash=null;_lastSeenExpenseCount=0;if(pollTimer)clearInterval(pollTimer);renderRoot();}},S.user+" ↩"),
  );

  // ── Section bar ───────────────────────────────────────────────────────────
  const sections=[["ledger","💰","Ledger"],["shopping","🛒","Shopping"],["blackboard","📋","Blackboard"]];
  let activeSection=S.section;
  const sectionBtns={};

  const shopPanel=mk("div",{cls:"tab-panel",id:"section-shopping"});
  const boardPanel=mk("div",{cls:"tab-panel",id:"section-blackboard"},
    mk("div",{cls:"body"},mk("p",{cls:"empty",style:"margin-top:60px;"},"Coming soon ✨"))
  );

  function switchSection(s){
    sectionBtns[activeSection].classList.remove("active");
    activeSection=s; S.section=s; ls.set("lb_section",s);
    sectionBtns[s].classList.add("active");
    if(s==="ledger"){
      nav.style.display=""; body.style.display="";
      shopPanel.classList.remove("active"); boardPanel.classList.remove("active");
    } else if(s==="shopping"){
      nav.style.display="none"; body.style.display="none";
      shopPanel.classList.add("active"); boardPanel.classList.remove("active");
      refreshShopping();
      const sd=el("dot-shopping");
      if(sd&&sd.classList.contains("new")){
        // pull fresh data
        setDot("dot-shopping","pulling");
        load(true).then(()=>{
          _lastSeenShoppingHash=S.shopping.map(i=>i.id+i.done+i.color).join("|");
          refreshShopping();
          setDot("dot-shopping","synced");
        });
      } else if(_shopDirty){
        shopCommit();
      }
    } else {
      nav.style.display="none"; body.style.display="none";
      shopPanel.classList.remove("active"); boardPanel.classList.add("active");
    }
  }

  const sectionBar=mk("div",{cls:"section-bar"},...sections.map(([v,icon,label])=>{
    const dotId=v==="ledger"?"dot-ledger":v==="shopping"?"dot-shopping":"dot-board";
    const dot=mk("span",{cls:"sec-dot synced",id:dotId});
    const b=mk("button",{cls:"section-btn"+(v===activeSection?" active":""),onClick:()=>switchSection(v)},
      mk("span",{cls:"s-icon"},icon),
      mk("span",{cls:"s-label",style:"display:flex;align-items:center;"},label,dot),
    );
    sectionBtns[v]=b; return b;
  }));

  const tabs=[["log","＋ Log"],["history","History"],["balance","Balance"],["insights","Insights"]];
  let activeTab="log";
  const navBtns={};

  // History dot — lives in the History sub-tab button
  const histDot=mk("span",{cls:"sec-dot synced",id:"dot-history"});

  const panels={log:mk("div",{cls:"tab-panel active",id:"tab-log"},logForm),history:histPanel,balance:balPanel,insights:insPanel};

  function switchTab(t){
    navBtns[activeTab].classList.remove("active"); panels[activeTab].classList.remove("active");
    activeTab=t;
    navBtns[t].classList.add("active"); panels[t].classList.add("active");
    if(t==="history"){
      // if red, pull fresh data
      const d=el("dot-history");
      if(d&&d.classList.contains("new")){
        setDot("dot-history","pulling");
        setDot("dot-ledger","pulling");
        load(true).then(()=>{
          _lastSeenExpenseCount=S.expenses.length;
          setDot("dot-history","synced");
          setDot("dot-ledger","synced");
        });
      }
    }
  }

  const nav=mk("div",{cls:"nav"},...tabs.map(([v,l])=>{
    const b=mk("button",{cls:"nav-btn"+(v==="log"?" active":""),onClick:()=>switchTab(v)},
      v==="history"?mk("span",{style:"display:flex;align-items:center;justify-content:center;gap:4px;"},l,histDot):l
    );
    navBtns[v]=b; return b;
  }));

  const body=mk("div",{cls:"body"},...Object.values(panels));

  // hide nav/body if not on ledger section at start
  if(activeSection!=="ledger"){nav.style.display="none";body.style.display="none";}
  if(activeSection==="shopping") shopPanel.classList.add("active");
  if(activeSection==="blackboard") boardPanel.classList.add("active");

  appShell=mk("div",{id:"app-shell"},header,sectionBar,nav,body,shopPanel,boardPanel);
  return appShell;
}

// ── Targeted refresh functions (don't touch the log form) ─────────────────────
function refreshHistory(){
  const hb=el("hist-body"); if(!hb)return;
  // Don't refresh if an edit form is currently open — would destroy mid-edit
  if(hb.querySelector(".expense-row.editing")) return;
  hb.innerHTML="";
  if(S.loading){hb.append(mk("p",{cls:"empty"},"Loading…"));return;}
  if(S.loadErr){hb.append(mk("p",{cls:"err-text"},S.loadErr));return;}
  if(!S.expenses.length){hb.append(mk("p",{cls:"empty"},"No expenses yet."));return;}
  const grouped={};
  S.expenses.forEach(e=>{if(!grouped[e.date])grouped[e.date]=[];grouped[e.date].push(e);});
  Object.entries(grouped).sort(([a],[b])=>b.localeCompare(a)).forEach(([date,items])=>{
    items.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
    hb.append(mk("div",{cls:"date-group"},fmtDate(date)));
    items.forEach(e=>{
      const isMine = e.person===S.user;
      const row = mk("div",{cls:"expense-row "+(isMine?"mine":"theirs"),style:"user-select:none;"});

      function buildNormalView(){
        row.innerHTML="";
        row.className="expense-row "+(isMine?"mine":"theirs");
        row.style.userSelect="none";
        row.append(
          mk("div",{cls:"expense-left"},
            mk("span",{cls:"expense-cat"},e.category.split(" ")[0]),
            mk("div",{},mk("div",{cls:"expense-desc"},e.description),mk("div",{cls:"expense-person"},isMine?"You":e.person)),
          ),
          mk("div",{cls:"expense-right"},
            mk("span",{cls:"expense-amt"},"€"+e.amount.toFixed(2)),
            isMine?mk("button",{cls:"delete-btn",onClick:(ev)=>{ev.stopPropagation();freshWrite((ex,m,sh)=>({expenses:ex.filter(x=>x.id!==e.id),memory:m,shopping:sh}));}},"×"):null,
          ),
        );
        if(isMine) attachLongPress(row);
      }

      function attachLongPress(el){
        let timer=null;
        el.addEventListener("touchstart",()=>{timer=setTimeout(()=>buildEditView(),600);},{passive:true});
        el.addEventListener("touchend",()=>{clearTimeout(timer);});
        el.addEventListener("touchmove",()=>{clearTimeout(timer);});
      }

      function buildEditView(){
        row.innerHTML="";
        row.className="expense-row editing";

        let editAmt=e.amount.toString();
        let editDesc=e.description;
        let editCat=e.category;
        let editDateMode=e.date===todayStr()?"today":"manual";
        let editDate=e.date;

        const amtIn=mk("input",{cls:"edit-amt",type:"number",value:editAmt,inputmode:"decimal",onInput:ev=>editAmt=ev.target.value});
        const descIn=mk("input",{cls:"edit-desc",type:"text",value:editDesc,onInput:ev=>editDesc=ev.target.value});
        const catSel=mk("select",{cls:"edit-cat",onChange:ev=>editCat=ev.target.value},
          ...CATS.map(c=>Object.assign(mk("option",{value:c},c),{selected:c===editCat}))
        );

        const dateDisplay=mk("div",{cls:"edit-date-display"},fmtDate(editDate));
        const editDatePick=mk("input",{type:"date",value:editDate,
          style:"position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;",
          onChange:ev=>{if(!ev.target.value)return;editDate=ev.target.value;editDateMode="manual";todayTabE.className="edit-date-tab";manualTabE.className="edit-date-tab active";dateDisplay.textContent=fmtDate(ev.target.value);}
        });
        const todayTabE=mk("button",{cls:"edit-date-tab"+(editDateMode==="today"?" active":""),type:"button",onClick:()=>{
          editDateMode="today";editDate=todayStr();
          todayTabE.className="edit-date-tab active";manualTabE.className="edit-date-tab";
          dateDisplay.textContent="Today";
        }},"Today");
        const manualTabE=mk("div",{cls:"edit-date-tab"+(editDateMode==="manual"?" active":""),style:"position:relative;cursor:pointer;"},"Pick date");
        manualTabE.appendChild(editDatePick);

        const saveBtn=mk("button",{cls:"edit-save",onClick:async()=>{
          const amt=parseFloat(editAmt);
          if(!amt||amt<=0||!editDesc.trim()) return;
          // collapse to normal view immediately in greyscale
          e.amount=amt; e.description=editDesc.trim(); e.category=editCat; e.date=editDate;
          buildNormalView();
          row.className="expense-row "+(isMine?"mine":"theirs")+" saving";
          await freshWrite((exps,mem,sh)=>({
            expenses:exps.map(x=>x.id===e.id?{...x,amount:amt,description:editDesc.trim(),category:editCat,date:editDate}:x)
                        .sort((a,b)=>b.date.localeCompare(a.date)),
            memory:mem,
            shopping:sh,
          }));
          row.className="expense-row "+(isMine?"mine":"theirs")+" save-done";
          setTimeout(()=>{row.className="expense-row "+(isMine?"mine":"theirs");},600);
        }},"✓ Save");

        const cancelBtn=mk("button",{cls:"edit-cancel",onClick:()=>buildNormalView()},"Cancel");

        row.append(mk("div",{cls:"edit-form"},
          mk("div",{cls:"edit-row-inputs"},amtIn,descIn),
          catSel,
          mk("div",{cls:"edit-date-row"},todayTabE,manualTabE),
          dateDisplay,
          mk("div",{cls:"edit-actions"},saveBtn,cancelBtn),
        ));
      }

      buildNormalView();
      hb.append(row);
    });
  });
}

function refreshBalance(){
  const bp=el("tab-balance"); if(!bp)return;
  bp.innerHTML="";
  const totals=PEOPLE.reduce((a,p)=>{a[p]=S.expenses.filter(e=>e.person===p).reduce((s,e)=>s+e.amount,0);return a;},{});
  const grand=Object.values(totals).reduce((s,v)=>s+v,0);
  const fair=grand/2;
  const bal=PEOPLE.reduce((a,p)=>{a[p]=totals[p]-fair;return a;},{});
  const partner=PEOPLE.find(p=>p!==S.user);
  bp.append(
    mk("div",{cls:"balance-total"},
      mk("div",{cls:"balance-total-label"},"Total pool spent"),
      mk("div",{cls:"balance-total-amt"},"€"+grand.toFixed(2)),
      mk("div",{cls:"balance-fair"},"Fair share: €"+fair.toFixed(2)+" each"),
    ),
    ...PEOPLE.map(p=>{
      const b=bal[p],isMe=p===S.user;
      return mk("div",{cls:"balance-card"+(isMe?" me":"")},
        mk("div",{cls:"balance-name"},isMe?p+" (you)":p),
        mk("div",{cls:"balance-spent"},"€"+totals[p].toFixed(2)),
        mk("div",{cls:"balance-status",style:`color:${b>0?"#2d8a4e":b<0?"#b94040":"#888"}`},
          Math.abs(b)<.01?"Even ✓":b>0?`+€${b.toFixed(2)} to receive`:`-€${Math.abs(b).toFixed(2)} to contribute`),
      );
    }),
  );
  if(Math.abs(bal[S.user])>.01)
    bp.append(mk("div",{cls:"verdict"},bal[S.user]>0?`${partner} owes you €${bal[S.user].toFixed(2)}`:`You owe ${partner} €${Math.abs(bal[S.user]).toFixed(2)}`));

  bp.append(mk("div",{style:"margin-top:32px;padding-top:16px;border-top:1px solid var(--border-d);"},
    mk("button",{
      style:"background:none;border:1px solid #ccc;color:#bbb;border-radius:6px;padding:6px 14px;font-size:12px;font-family:inherit;cursor:pointer;",
      onClick:async()=>{
        if(!confirm("Reset all expenses and data? This cannot be undone.")) return;
        await apiWrite(S.url,{expenses:[],memory:{}});
        S.expenses=[]; S.memory={};
        refreshHistory(); refreshBalance(); refreshInsights();
      }
    },"⚠ Reset all data")
  ));
}

function refreshInsights(){
  const ip=el("tab-insights"); if(!ip)return;
  ip.innerHTML="";
  const now=new Date();
  const rangeTabs=mk("div",{cls:"range-tabs"},...[["month","This month"],["30days","30 days"],["all","All time"]].map(([r,l])=>
    mk("button",{cls:"range-tab"+(S.insightsRange===r?" active":""),onClick:()=>{S.insightsRange=r;refreshInsights();}},l)
  ));
  ip.append(rangeTabs);
  const filtered=S.expenses.filter(e=>{
    const d=new Date(e.date+"T12:00:00");
    if(S.insightsRange==="month")return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
    if(S.insightsRange==="30days")return(now-d)/86400000<=30;
    return true;
  });
  const bycat={};
  CATS.forEach(c=>{bycat[c]={total:0,byPerson:{}};PEOPLE.forEach(p=>{bycat[c].byPerson[p]=0;});});
  filtered.forEach(e=>{bycat[e.category].total+=e.amount;bycat[e.category].byPerson[e.person]+=e.amount;});
  const ranked=Object.entries(bycat).filter(([,v])=>v.total>0).sort((a,b)=>b[1].total-a[1].total);
  if(!ranked.length){ip.append(mk("p",{cls:"empty"},"No expenses in this period yet."));return;}
  const grandCat=ranked.reduce((s,[,v])=>s+v.total,0);
  const maxT=ranked[0][1].total;
  const rl=S.insightsRange==="month"?now.toLocaleDateString("en-GB",{month:"long",year:"numeric"}):S.insightsRange==="30days"?"Last 30 days":"All time";
  ip.append(mk("div",{cls:"insights-period"},rl+" · €"+grandCat.toFixed(2)+" total"));
  ranked.forEach(([cat,data])=>{
    const emoji=cat.split(" ")[0],name=cat.split(" ").slice(1).join(" ");
    const pct=((data.total/grandCat)*100).toFixed(0);
    const bars=PEOPLE.map((p,i)=>{const w=data.byPerson[p]>0?(data.byPerson[p]/maxT)*100:0;return w>0?mk("div",{cls:"bar-seg",style:`width:${w}%;background:${i===0?"#c9a84c":"#8aafc9"};border-radius:${i===0?"3px 0 0 3px":"0 3px 3px 0"}`}):null;}).filter(Boolean);
    const chips=PEOPLE.map((p,i)=>data.byPerson[p]>0?mk("span",{cls:"insight-chip",style:`color:${i===0?"#a07830":"#4a7a9b"}`},`${p===S.user?"You":p} €${data.byPerson[p].toFixed(2)}`):null).filter(Boolean);
    ip.append(mk("div",{cls:"insight-row"},
      mk("div",{cls:"insight-top"},mk("div",{cls:"insight-label"},mk("span",{cls:"insight-emoji"},emoji),mk("span",{cls:"insight-name"},name)),mk("div",{cls:"insight-amt-block"},mk("span",{cls:"insight-amt"},"€"+data.total.toFixed(2)),mk("span",{cls:"insight-pct"},pct+"%"))),
      mk("div",{cls:"bar-track"},...bars),
      mk("div",{cls:"insight-people"},...chips),
    ));
  });
  ip.append(mk("div",{cls:"legend"},...PEOPLE.map((p,i)=>mk("span",{cls:"legend-item"},mk("span",{cls:"legend-dot",style:`background:${i===0?"#c9a84c":"#8aafc9"}`}),p===S.user?p+" (you)":p))));
}

const SHOP_COLORS=["","c-gold","c-blue","c-green"];
let _shopInpEl=null; // kept alive across refreshes

function refreshShopping(){
  const sp=el("section-shopping"); if(!sp) return;

  // ── Build input row once, never rebuild ───────────────────────────────────
  if(!_shopInpEl){
    let newItem="";
    _shopInpEl=mk("input",{cls:"shop-input",type:"text",placeholder:"Add item…",
      onInput:e=>newItem=e.target.value,
      onKeydown:e=>{if(e.key==="Enter"&&newItem.trim()) addItem();}
    });
    async function addItem(){
      if(!newItem.trim()) return;
      const item={id:Date.now().toString(),text:newItem.trim(),done:false,color:"",createdAt:new Date().toISOString()};
      S.shopping=[item,...S.shopping];
      _shopDirty=true;
      setDot("dot-shopping","local");
      rebuildShopList();
      _shopInpEl.value=""; newItem="";
      setTimeout(()=>_shopInpEl.focus(),0);
      // start auto-save timer
      if(_shopAutoTimer) clearTimeout(_shopAutoTimer);
      _shopAutoTimer=setTimeout(()=>shopCommit(),10000);
    }
    const inputRow=mk("div",{cls:"shop-input-row"},_shopInpEl);
    inputRow.id="shop-input-row";

    sp.innerHTML="";
    const wrap=mk("div",{cls:"body",id:"shop-wrap"},inputRow,mk("div",{id:"shop-list-wrap"}));
    sp.append(wrap);
  }

  rebuildShopList();
}

function rebuildShopList(){
  const wrap=el("shop-list-wrap"); if(!wrap) return;
  wrap.innerHTML="";

  if(!S.shopping.length){
    wrap.append(mk("p",{cls:"empty"},"Nothing on the list."));
    return;
  }

  const ordered=[...S.shopping.filter(i=>!i.done),...S.shopping.filter(i=>i.done)];
  const listEl=mk("div",{id:"shop-list"});
  let dragSrc=null;

  ordered.forEach(item=>{
    const color=item.color||"";
    const row=mk("div",{cls:"shop-item"+(item.done?" done":"")+(color?" "+color:"")});
    row.dataset.id=item.id;

    const handle=mk("span",{cls:"shop-handle"},"⠿");
    handle.addEventListener("touchstart",e=>{
      e.stopPropagation();
      dragSrc=row;
      row.classList.add("dragging");
    },{passive:true});

    const check=mk("div",{cls:"shop-check",onClick:async()=>{
      await shopWrite(S.shopping.map(x=>x.id===item.id?{...x,done:!x.done}:x));
    }},item.done?"✓":"");

    const text=mk("span",{cls:"shop-text"},item.text);
    const del=mk("button",{cls:"shop-del",onClick:async()=>{
      await shopWrite(S.shopping.filter(x=>x.id!==item.id));
    }},"×");

    let swipeStartX=null;
    row.addEventListener("touchstart",e=>{
      if(e.target===handle) return;
      swipeStartX=e.touches[0].clientX;
    },{passive:true});
    row.addEventListener("touchend",e=>{
      if(swipeStartX===null||e.target===handle) return;
      const dx=e.changedTouches[0].clientX-swipeStartX;
      if(Math.abs(dx)<40){swipeStartX=null;return;}
      const cur=SHOP_COLORS.indexOf(item.color||"");
      const next=dx>0?(cur+1)%SHOP_COLORS.length:(cur-1+SHOP_COLORS.length)%SHOP_COLORS.length;
      swipeStartX=null;
      shopWrite(S.shopping.map(x=>x.id===item.id?{...x,color:SHOP_COLORS[next]}:x));
    },{passive:true});

    row.append(handle,check,text,del);
    listEl.append(row);
  });

  listEl.addEventListener("touchmove",e=>{
    if(!dragSrc) return;
    e.preventDefault();
    const touch=e.touches[0];
    const els=[...listEl.querySelectorAll(".shop-item:not(.dragging)")];
    els.forEach(el=>el.classList.remove("drag-over"));
    const target=els.find(el=>{const r=el.getBoundingClientRect();return touch.clientY>=r.top&&touch.clientY<=r.bottom;});
    if(target) target.classList.add("drag-over");
  },{passive:false});

  listEl.addEventListener("touchend",async()=>{
    if(!dragSrc) return;
    dragSrc.classList.remove("dragging");
    const over=listEl.querySelector(".drag-over");
    if(over&&over!==dragSrc){
      over.classList.remove("drag-over");
      const ids=ordered.map(i=>i.id);
      const srcIdx=ids.indexOf(dragSrc.dataset.id);
      const tgtIdx=ids.indexOf(over.dataset.id);
      const reordered=[...ordered];
      const [moved]=reordered.splice(srcIdx,1);
      reordered.splice(tgtIdx,0,moved);
      await shopWrite(reordered);
    } else {
      listEl.querySelectorAll(".drag-over").forEach(el=>el.classList.remove("drag-over"));
    }
    dragSrc=null;
  });

  wrap.append(listEl);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
renderRoot();
if(S.url&&S.user){load();startPoll();}
</script>
